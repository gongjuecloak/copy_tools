name: Build and Release EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 步骤1：安装依赖并输出详细日志
      - name: Install dependencies
        run: |
          python --version
          pip --version
          python -m pip install --upgrade pip
          pip install pyinstaller watchdog
          # 输出已安装的包，排查依赖问题
          pip list

      # 步骤2：验证代码文件存在性（关键）
      - name: Check project files
        run: |
          # 列出当前目录所有文件，确认主程序存在
          Get-ChildItem -Recurse
          # 检查主程序文件是否存在
          if (-not (Test-Path "copy_tools.py")) {
            Write-Error "主程序文件 copy_tools.py 不存在！"
            exit 1
          }
          # 检查配置文件（可选）
          if (-not (Test-Path "copy.ini")) {
            Write-Warning "配置文件 copy.ini 不存在，将跳过上传"
          }

      # 步骤3：打包EXE（增加错误捕获和详细日志）
      - name: Build EXE with PyInstaller
        run: |
          # 使用PowerShell兼容的打包命令，输出详细日志
          pyinstaller --onefile `
            --name "FileMoveTool" `
            --clean `
            --encoding utf-8 `
            --log-level=DEBUG `
            copy_tools.py
        continue-on-error: false  # 打包失败直接终止流程

      # 步骤4：验证打包结果（兼容PowerShell语法）
      - name: Verify build result
        run: |
          # PowerShell正确的路径检查语法
          if (Test-Path "dist\FileMoveTool.exe") {
            Write-Host "打包成功！EXE文件信息："
            Get-ChildItem dist\FileMoveTool.exe | Format-List
          } else {
            Write-Error "打包失败！dist目录内容："
            Get-ChildItem -Path . -Recurse | Where-Object {$_.DirectoryName -match "dist"}
            exit 1
          }

      # 步骤5：准备发布文件（处理配置文件不存在的情况）
      - name: Prepare release files
        run: |
          # 创建临时发布目录
          New-Item -ItemType Directory -Path release -Force
          # 复制EXE文件
          Copy-Item dist\FileMoveTool.exe release\
          # 复制配置文件（存在则复制）
          if (Test-Path "copy.ini") {
            Copy-Item copy.ini release\
          }
          # 生成版本信息
          echo "FileMoveTool v${{ github.ref_name || 'latest' }}" > release\version.txt
          # 列出发布文件
          Get-ChildItem release\

      # 步骤6：上传到Release
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/FileMoveTool.exe
            release/copy.ini*  # *表示存在则上传
            release/version.txt
          name: ${{ github.ref_name || 'Latest Build' }}
          body: |
            ## 文件移动工具 ${{ github.ref_name || '最新构建' }}
            - 构建环境：Windows Server 2022 + Python 3.13
            - 打包工具：PyInstaller
            - 无需安装Python，直接运行EXE
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}