name: Build and Release EXE

# 触发条件：1. 手动触发 2. 创建Tag时自动触发
on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'  # 以v开头的Tag（如v2.2.0）触发

# 工作流权限配置
permissions:
  contents: write  # 允许写入Release内容

jobs:
  build-windows-exe:
    runs-on: windows-latest  # 使用Windows环境打包EXE
    
    steps:
      # 步骤1：拉取代码到工作环境（关键：确保检出完整代码）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 拉取完整代码（避免浅克隆导致文件找不到）
      
      # 步骤2：配置Python环境（移除自动缓存，避免找不到依赖文件报错）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # 匹配你的Python版本
          # 注释掉cache选项，避免自动查找requirements.txt报错
          # cache: 'pip'
      
      # 步骤3：手动创建requirements.txt（解决缓存依赖，可选）
      - name: Create requirements.txt
        run: |
          # 手动写入项目依赖（和你的程序匹配）
          echo "watchdog>=3.0.0" > requirements.txt
          echo "pyinstaller>=6.0.0" >> requirements.txt
          # 查看生成的文件（调试用）
          type requirements.txt
      
      # 步骤4：安装依赖（包括打包工具和程序依赖）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 从手动创建的requirements.txt安装依赖
          pip install -r requirements.txt
      
      # 步骤5：使用PyInstaller打包EXE（解决中文路径/编码问题）
      - name: Build EXE with PyInstaller
        run: |
          # 打包命令：单文件 + 指定名称 + UTF8编码 + 清理缓存
          pyinstaller --onefile --name "FileMoveTool" --clean --encoding utf-8 copy_tools.py
          # 查看打包结果
          dir dist\
      
      # 步骤6：创建/更新Release并上传EXE文件
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # 上传打包后的EXE和配置文件模板
          files: |
            dist/FileMoveTool.exe
            copy.ini  # 确保你的仓库中有这个配置模板文件
            requirements.txt
          # Release信息配置
          name: ${{ github.ref_name || 'Latest Build' }}
          body: |
            ## 文件移动工具 ${{ github.ref_name || '最新构建' }}
            - 基于Python 3.13 + PyInstaller自动打包
            - 支持Windows直接运行（无需安装Python）
            - 包含配置文件模板（copy.ini）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}