name: 构建并发布EXE（直接上传EXE文件）

on:
  workflow_dispatch:  # 手动触发（兼容无tag场景）
  push:
    tags:
      - '[0-9]+.[0-9]+.*'  # 匹配 1.0、2.1.3 等版本标签
      - 'v*'               # 匹配 v1.0、v2.1 等版本标签

permissions:
  contents: write  # 必须：允许创建/编辑Release
  actions: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller watchdog PyQt5
          # 打印已安装包，排查依赖问题
          pip list

      # 关键：修复打包命令（移除无效的--encoding参数）
      - name: 打包EXE文件并验证
        run: |
          # 打印当前目录结构（调试用）
          Write-Host "=== 当前目录文件列表 ==="
          Get-ChildItem -Recurse
          
          # 核心修复：移除--encoding参数，PyInstaller不支持该参数
          # 中文名称兼容：通过设置环境变量确保中文文件名正常
          $env:PYTHONIOENCODING = 'utf-8'
          pyinstaller --onefile --name "自动文件移动工具" --clean copy_tools.py
          
          # 打印dist目录（确认EXE是否生成）
          Write-Host "=== dist目录文件列表 ==="
          Get-ChildItem -Path "dist" -Recurse -ErrorAction SilentlyContinue
          
          # 验证EXE存在（兼容大小写/路径分隔符）
          $exePath = Join-Path -Path "dist" -ChildPath "自动文件移动工具.exe"
          if (-not (Test-Path $exePath -PathType Leaf)) {
            Write-Error "❌ EXE打包失败！未找到文件：$exePath"
            # 打印详细错误日志（便于排查）
            Write-Host "=== 打包日志 ==="
            Get-Content -Path "auto-py-to-exe.log" -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "✅ EXE文件生成成功：$exePath"
          # 打印文件大小（确认文件完整）
          $fileInfo = Get-Item $exePath
          Write-Host "📄 EXE文件大小：$($fileInfo.Length) 字节"

      # 上传EXE到GitHub Releases
      - name: 上传EXE文件到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'  # 避免PR触发
        with:
          files: |
            ${{ github.workspace }}\dist\自动文件移动工具.exe
          name: ${{ github.ref_name || 'v1.0.0' }}
          draft: false
          prerelease: false
          body: |
            ## 自动文件移动工具 ${{ github.ref_name || 'v1.0.0' }}
            ### 📦 下载使用说明
            1. 下载 `自动文件移动工具.exe` 文件
            2. 准备 `copy.ini` 配置文件（与EXE同目录）
            3. 修改配置后双击EXE运行
            ### ⚠️ 注意事项
            - EXE需与copy.ini放在同一目录
            - 首次运行请先配置源目录/目标目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONIOENCODING: utf-8

  # 可选：增加Artifact上传（备用方案）
  upload-artifact:
    needs: build-windows-exe
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 临时上传EXE作为Artifact（备用）
        uses: actions/upload-artifact@v4
        with:
          name: 自动文件移动工具
          path: ${{ github.workspace }}\dist\自动文件移动工具.exe