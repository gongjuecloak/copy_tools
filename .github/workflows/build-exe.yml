name: Build and Release EXE (Direct EXE Upload)

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.*'
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller watchdog PyQt5

      # 打包EXE并验证（工具名改为自动相关）
      - name: Build EXE and verify
        run: |
          # 打包为单文件EXE，名称改为「自动文件移动工具」（中文名称兼容）
          pyinstaller --onefile --name "自动文件移动工具" --clean copy_tools.py
          # 验证EXE存在
          if (-not (Test-Path "dist\自动文件移动工具.exe")) {
            Write-Error "❌ EXE打包失败！"
            exit 1
          }
          Write-Host "✅ EXE文件已生成：dist\自动文件移动工具.exe"

      # 直接上传EXE到GitHub Releases（无需ZIP）
      - name: Upload EXE to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # 直接上传EXE文件
          files: |
            dist\自动文件移动工具.exe
          name: ${{ github.ref_name }}
          body: |
            ## 自动文件移动工具 ${{ github.ref_name }}
            ### 📦 下载说明
            1. 下载 `自动文件移动工具.exe`
            2. 准备好 `copy.ini` 配置文件（与EXE同目录）
            3. 修改 `copy.ini` 配置后，双击EXE运行
            ### ⚠️ 注意
            - EXE需与配置文件放在同一目录
            - 首次运行请先配置源目录/目标目录等参数
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}