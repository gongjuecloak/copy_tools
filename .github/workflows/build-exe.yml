name: 构建并发布EXE（直接上传EXE文件）

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.*'
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller watchdog PyQt5
          pip list

      - name: 打包EXE文件（改用英文名称，避免编码问题）
        run: |
          # 强制设置系统区域为UTF-8（兜底）
          chcp 65001
          $env:PYTHONIOENCODING = 'utf-8'
          $env:LANG = 'zh_CN.UTF-8'
          
          # 核心修改：使用英文名称 FileMoveTool（CI环境最稳定）
          pyinstaller --onefile --name "FileMoveTool" --clean copy_tools.py
          
          # 严格验证：必须找到 FileMoveTool.exe
          $exePath = Join-Path -Path "dist" -ChildPath "FileMoveTool.exe"
          if (-not (Test-Path $exePath -PathType Leaf)) {
            Write-Error "❌ EXE打包失败！未找到 FileMoveTool.exe，当前dist目录内容："
            Get-ChildItem -Path "dist" -Recurse -ErrorAction SilentlyContinue
            exit 1
          }
          
          # 验证文件大小（避免空文件）
          $fileSize = (Get-Item $exePath).Length
          if ($fileSize -lt 1024 * 1024) { # 小于1MB则判定为异常
            Write-Error "❌ EXE文件异常！大小仅 $fileSize 字节（正常应≥10MB）"
            exit 1
          }
          
          Write-Host "✅ EXE文件生成成功：$exePath（大小：$fileSize 字节）"

      - name: 上传EXE到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          files: |
            ${{ github.workspace }}\dist\FileMoveTool.exe
          name: ${{ github.ref_name || 'v1.0.0' }}
          body: |
            ## 自动文件移动工具 ${{ github.ref_name || 'v1.0.0' }}
            ### 📦 下载使用说明
            1. 下载 `FileMoveTool.exe` 文件（建议重命名为「自动文件移动工具.exe」）
            2. 准备 `copy.ini` 配置文件（与EXE同目录）
            3. 修改配置后双击EXE运行
            ### ⚠️ 注意事项
            - EXE需与copy.ini放在同一目录
            - 首次运行请先配置源目录/目标目录

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传EXE作为Artifact（备用）
        uses: actions/upload-artifact@v4
        with:
          name: FileMoveTool
          path: ${{ github.workspace }}\dist\FileMoveTool.exe
          retention-days: 30