[Basis]
# 源路径（路径最后无需斜杠）
src_dir = D:\user\download\copy_tools-main\copy_tools-main\1
# 目标路径（路径最后无需斜杠）
dst_dir = D:\user\download\copy_tools-main\copy_tools-main\2
# 类型，1 为源路径下有格式为YYMMDD格式文件夹；2 为无需指向源路径下的子文件夹内
type = 2
# 当文件夹为空时，程序的休息时间，需要大于执行时间，当小于时只会按执行时间进行，目前单位为秒，支持小数点
rest_time = 120.5
# 程序执行时间，多久执行一次，目前单位为秒，支持小数点
execution_time = 60.0