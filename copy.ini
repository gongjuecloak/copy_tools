[file_config]
# 源路径（路径最后无需斜杠）
src_dir = D:\user\download\copy_tools-main\copy_tools-main\2
# 目标路径（路径最后无需斜杠）
dst_dir = D:\user\download\copy_tools-main\copy_tools-main\1
# 类型：1-按日期子目录监控 2-直接监控源目录
type = 2
# 源目录为空时的休息时间（秒）
rest_time = 120.5
# 执行/触发间隔（秒）
execution_time = 10
# 可选：文件过滤 - 仅移动指定后缀（多个用逗号分隔，空表示不过滤）
file_extensions = .html
# 可选：文件过滤 - 仅移动指定前缀（多个用逗号分隔，空表示不过滤）
file_prefixes = 